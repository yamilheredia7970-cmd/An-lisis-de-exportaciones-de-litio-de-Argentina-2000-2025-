<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Exportaciones Litio Argentino</title>
    
    <!-- Failsafe Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {}
        }
      }
    </script>
    
    <!-- Core External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-900 text-slate-50 min-h-screen font-sans">
    
    <!-- Loading Screen -->
    <div id="loader" class="min-h-screen flex items-center justify-center bg-slate-900 absolute inset-0 z-50">
      <div class="animate-spin text-blue-500">
        <i data-lucide="loader-2" class="w-10 h-10"></i>
      </div>
      <div class="ml-4 text-blue-400 font-semibold text-lg" id="loading-text">Cargando tablero...</div>
    </div>

    <!-- Application Root -->
    <div id="root"></div>

    <!-- Vanilla Javascript (No Módulos para máxima compatibilidad) -->
    <script src="main.js" defer></script>
  </body>
</html>
